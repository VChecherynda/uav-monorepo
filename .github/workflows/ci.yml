name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://uav:uav@localhost:5432/uav_dev
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uav
          POSTGRES_PASSWORD: uav
          POSTGRES_DB: uav_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/dashboard

      - name: Run unit tests
        run: |
          npm run test --workspace=packages/shared -- --run
          npm run test --workspace=apps/api -- --run
          npm run test --workspace=apps/dashboard -- --run

      - name: Setup DB
        run: |
          npx prisma migrate deploy
          npx prisma db seed
        working-directory: apps/api

      - name: Start API
        run: npm run dev:ci --workspace=apps/api &
        env:
          JWT_SECRET: ci-test-secret
          CORS_ORIGINS: http://localhost:3000
          PORT: "4000"

      - name: Wait for API
        run: npx wait-on http://localhost:4000/health -t 30000

      - name: Run e2e tests
        run: |
          npm run test:e2e  --workspace=apps/dashboard
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws/drones
          NEXT_PUBLIC_MAPTILER_KEY: ci-dummy
          CI: "true"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/dashboard/test-results/
